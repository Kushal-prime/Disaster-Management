# Render Blueprint: TRINETRA Disaster Management
# Connect this repo at https://dashboard.render.com/blueprints

services:
  - type: web
    name: trinetra-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: python -m pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false

  - type: web
    name: trinetra-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false
      - key: REACT_APP_WS_URL
        sync: false
